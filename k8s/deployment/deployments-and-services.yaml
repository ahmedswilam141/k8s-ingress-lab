apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svc-frontend
  template:
    metadata:
      labels:
        app: svc-frontend   
    spec:
      containers:
        - name: backend-a
          image: svc-frontend:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000  
---
apiVersion: v1
kind: Service
metadata:
  name: svc-frontend
spec:
  type: ClusterIP
  selector:
    app: svc-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: svc-api
  template:
    metadata:
      labels:
        app: svc-api      
    spec:
      containers:
        - name: backend-b
          image: svc-api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: svc-api
spec:
  type: ClusterIP
  selector:
    app: svc-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-c
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-svc
  template:
    metadata:
      labels:
        app: admin-svc     
    spec:
      containers:
        - name: backend-c
          image: admin-svc:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: admin-svc
spec:
  type: ClusterIP
  selector:
    app: admin-svc
  ports:
    - port: 9090
      targetPort: 9090